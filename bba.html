<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BBA Study Timetable with Expert Suggestions</title>
  <style>
    body {
      background: url("https://img.freepik.com/premium-photo/camera-with-plants-figurine-against-white-background-table_1048944-4915753.jpg");
      background-size: cover;
      font-family: Arial, sans-serif;
      padding: 20px;
    }
    h1 {
      text-align: center;
      color: slateblue;
    }
    h2 {
      text-align: center;
      color: slateblue;
    }
    table {
      width: 80%;
      margin: 0 auto;
      border-collapse: collapse;
      background-color: rgba(255, 255, 255, 0.7);
    }
    th, td {
      border: 1px solid blue;
      padding: 12px;
      text-align: center;
    }
    th {
      background-color: rgba(255, 255, 255, 0.7);
      color: black;
    }
    .tracker {
      width: 80%;
      margin: 20px auto;
      background-color: white;
      padding: 15px;
      border: 1px solid blue;
    }
    .day-section {
      margin-bottom: 10px;
    }
    .suggestions {
      width: 80%;
      margin: 20px auto;
      background-color: white;
      padding: 15px;
      border: 1px solid blue;
    }
    .suggestions a {
      display: block;
      margin: 8px 0;
      font-size: 18px;
      color: blue;
      text-decoration: underline overline;
    }
  </style>
</head>
